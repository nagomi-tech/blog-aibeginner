<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>RNNにおける勾配消失問題のイメージ</title>
<desc>時刻1から時刻5まで5つのRNNブロックが時間方向に並んでいる。時刻5の誤差の勾配が時間を逆向きにさかのぼりながら過去のブロックへ伝えられていく。1ステップさかのぼるごとに勾配は係数を掛けられて小さくなっていくため、時刻1に届く頃にはほとんどゼロになっている。遠い未来の誤差が遠い過去の時点の重みにほとんど反映されなくなることを示している。</desc>
<defs>
<marker id="arrowL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowF" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.box-blue  { fill: #E6F1FB; stroke: #378ADD; }
.box-blue  .ts { fill: #0C447C; }
.box-coral { fill: #FAECE7; stroke: #D85A30; }
.box-coral .ts { fill: #4A1B0C; }
</style>

<text class="ts" x="340" y="26" text-anchor="middle">時間の経過（時刻1→時刻5）</text>

<g class="box-blue">
<rect x="40" y="50" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="80" y="72" text-anchor="middle" dominant-baseline="central">時刻1</text>
</g>
<g class="box-blue">
<rect x="160" y="50" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="200" y="72" text-anchor="middle" dominant-baseline="central">時刻2</text>
</g>
<g class="box-blue">
<rect x="280" y="50" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="320" y="72" text-anchor="middle" dominant-baseline="central">時刻3</text>
</g>
<g class="box-blue">
<rect x="400" y="50" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="440" y="72" text-anchor="middle" dominant-baseline="central">時刻4</text>
</g>
<g class="box-blue">
<rect x="520" y="50" width="80" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="560" y="72" text-anchor="middle" dominant-baseline="central">時刻5</text>
</g>

<g class="box-coral">
<rect x="604" y="128" width="64" height="44" rx="8" stroke-width="0.5"/>
<text class="ts" x="636" y="150" text-anchor="middle" dominant-baseline="central">誤差</text>
</g>

<text class="ts" x="500" y="168" text-anchor="middle" fill="#A32D2D">← 誤差がさかのぼる方向</text>

<path d="M602 148 L482 96" fill="none" stroke="#A32D2D" stroke-width="5" opacity="0.95" marker-end="url(#arrowL)"/>
<path d="M398 96 L362 96" fill="none" stroke="#A32D2D" stroke-width="5" opacity="0.70" marker-end="url(#arrowL)"/>
<path d="M278 96 L242 96" fill="none" stroke="#A32D2D" stroke-width="5" opacity="0.42" marker-end="url(#arrowL)"/>
<path d="M158 96 L122 96" fill="none" stroke="#A32D2D" stroke-width="5" opacity="0.18" marker-end="url(#arrowL)"/>
<path d="M38 96 L16 96"   fill="none" stroke="#888780" stroke-width="5" opacity="0.08" marker-end="url(#arrowF)"/>

<text class="ts" x="440" y="118" text-anchor="middle" fill="#A32D2D">×係数</text>
<text class="ts" x="320" y="118" text-anchor="middle" fill="#A32D2D">×係数</text>
<text class="ts" x="200" y="118" text-anchor="middle" fill="#A32D2D">×係数</text>
<text class="ts" x="80"  y="118" text-anchor="middle" fill="#888780">ほぼゼロ</text>

<text class="ts" x="340" y="210" text-anchor="middle">過去にさかのぼるほど、勾配は同じ係数の掛け算で急速に小さくなる</text>
<text class="ts" x="340" y="228" text-anchor="middle">→ 遠い未来の誤差が、遠い過去の時点の重みにほとんど反映されなくなる</text>
</svg>
