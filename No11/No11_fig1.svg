<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>RNNが隠れ状態を時間方向に引き継ぎながら系列データを処理する様子</title>
<desc>「あ」「り」「が」「と」「う」という5つの音が左から右へ順番にRNNに入力される。各時点でRNNは新しい音と、直前の時点から引き継いだ隠れ状態の両方を受け取り、新しい隠れ状態を作って次の時点へ渡していく。隠れ状態は時間とともに、それまでの音の情報を蓄積していく。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; }
.t  { font-size: 14px; fill: #2C2C2A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.box-coral { fill: #FAECE7; stroke: #D85A30; }
.box-coral .th { fill: #4A1B0C; }
.box-blue  { fill: #E6F1FB; stroke: #378ADD; }
.box-blue  .ts, .box-blue .th { fill: #0C447C; }
.box-gray  { fill: #F1EFE8; stroke: #888780; }
.box-gray  .ts { fill: #444441; }
</style>

<text class="ts" x="340" y="28" text-anchor="middle">時間の経過</text>
<line x1="60" y1="40" x2="620" y2="40" stroke="#B4B2A9" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="box-coral">
<rect x="60" y="70" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="100" y="94" text-anchor="middle" dominant-baseline="central">あ</text>
</g>
<g class="box-coral">
<rect x="184" y="70" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="224" y="94" text-anchor="middle" dominant-baseline="central">り</text>
</g>
<g class="box-coral">
<rect x="308" y="70" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="348" y="94" text-anchor="middle" dominant-baseline="central">が</text>
</g>
<g class="box-coral">
<rect x="432" y="70" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="472" y="94" text-anchor="middle" dominant-baseline="central">と</text>
</g>
<g class="box-coral">
<rect x="556" y="70" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="596" y="94" text-anchor="middle" dominant-baseline="central">う</text>
</g>
<text class="ts" x="340" y="60" text-anchor="middle">入力される音</text>

<line x1="100" y1="118" x2="100" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="224" y1="118" x2="224" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="348" y1="118" x2="348" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="472" y1="118" x2="472" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="596" y1="118" x2="596" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<g class="box-blue">
<rect x="60" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="100" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="184" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="224" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="308" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="348" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="432" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="472" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="556" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="596" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>

<path d="M140 184 L184 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M264 184 L308 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M388 184 L432 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M512 184 L556 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="162" y="174" text-anchor="middle" fill="#5F5E5A">隠れ</text>
<text class="ts" x="162" y="186" text-anchor="middle" fill="#5F5E5A">状態</text>
<text class="ts" x="286" y="174" text-anchor="middle" fill="#5F5E5A">隠れ</text>
<text class="ts" x="286" y="186" text-anchor="middle" fill="#5F5E5A">状態</text>
<text class="ts" x="410" y="174" text-anchor="middle" fill="#5F5E5A">隠れ</text>
<text class="ts" x="410" y="186" text-anchor="middle" fill="#5F5E5A">状態</text>
<text class="ts" x="534" y="174" text-anchor="middle" fill="#5F5E5A">隠れ</text>
<text class="ts" x="534" y="186" text-anchor="middle" fill="#5F5E5A">状態</text>

<line x1="100" y1="208" x2="100" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="224" y1="208" x2="224" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="348" y1="208" x2="348" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="472" y1="208" x2="472" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="596" y1="208" x2="596" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<g class="box-gray">
<rect x="60" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="100" y="268" text-anchor="middle" dominant-baseline="central">あ</text>
</g>
<g class="box-gray">
<rect x="184" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="224" y="268" text-anchor="middle" dominant-baseline="central">あ・り</text>
</g>
<g class="box-gray">
<rect x="308" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="348" y="268" text-anchor="middle" dominant-baseline="central">あ・り・が</text>
</g>
<g class="box-gray">
<rect x="432" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="472" y="268" text-anchor="middle" dominant-baseline="central">…が・と</text>
</g>
<g class="box-gray">
<rect x="556" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="596" y="268" text-anchor="middle" dominant-baseline="central">…と・う</text>
</g>
<text class="ts" x="340" y="306" text-anchor="middle">出力（その時点までに読んだ内容の要約）</text>
</svg>
