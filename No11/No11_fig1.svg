<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>RNNによる音声認識の入出力の流れ</title>
<desc>音の波形を表す信号が左から右へ時間順にRNNへ入力される。RNNは各時点で新しい音響特徴と直前の隠れ状態を受け取り、新しい隠れ状態を作って次の時点へ渡していく。出力段では、隠れ状態に蓄積された文脈をもとに「あ」「あり」「ありが」と認識結果が徐々に確定し、最終的に「ありがとう」という単語として認識される。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.box-coral { fill: #FAECE7; stroke: #D85A30; }
.box-blue  { fill: #E6F1FB; stroke: #378ADD; }
.box-blue  .th { fill: #0C447C; }
.box-teal  { fill: #E1F5EE; stroke: #1D9E75; }
.box-teal  .ts, .box-teal .th { fill: #085041; }
</style>

<text class="ts" x="340" y="28" text-anchor="middle">時間の経過</text>
<line x1="60" y1="40" x2="620" y2="40" stroke="#B4B2A9" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="60" text-anchor="middle">入力される音声信号</text>

<g class="box-coral">
<rect x="60" y="78" width="80" height="48" rx="8" stroke-width="0.5"/>
<path d="M72 102 L78 92 L84 110 L90 96 L96 106 L102 100 L108 104 L114 98 L120 102 L126 100" fill="none" stroke="#993C1D" stroke-width="1.2"/>
</g>
<g class="box-coral">
<rect x="184" y="78" width="80" height="48" rx="8" stroke-width="0.5"/>
<path d="M196 102 L202 88 L208 112 L214 94 L220 108 L226 98 L232 106 L238 96 L244 104 L250 100" fill="none" stroke="#993C1D" stroke-width="1.2"/>
</g>
<g class="box-coral">
<rect x="308" y="78" width="80" height="48" rx="8" stroke-width="0.5"/>
<path d="M320 102 L326 94 L332 108 L338 90 L344 110 L350 96 L356 104 L362 92 L368 108 L374 100" fill="none" stroke="#993C1D" stroke-width="1.2"/>
</g>
<g class="box-coral">
<rect x="432" y="78" width="80" height="48" rx="8" stroke-width="0.5"/>
<path d="M444 102 L450 90 L456 110 L462 96 L468 106 L474 98 L480 104 L486 94 L492 108 L498 100" fill="none" stroke="#993C1D" stroke-width="1.2"/>
</g>
<g class="box-coral">
<rect x="556" y="78" width="80" height="48" rx="8" stroke-width="0.5"/>
<path d="M568 102 L574 92 L580 108 L586 98 L592 106 L598 96 L604 104 L610 100 L616 102 L622 100" fill="none" stroke="#993C1D" stroke-width="1.2"/>
</g>
<text class="ts" x="100" y="142" text-anchor="middle" fill="#993C1D">単独では意味不明</text>

<line x1="100" y1="156" x2="100" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="224" y1="126" x2="224" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="348" y1="126" x2="348" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="472" y1="126" x2="472" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="596" y1="126" x2="596" y2="160" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<g class="box-blue">
<rect x="60" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="100" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="184" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="224" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="308" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="348" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="432" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="472" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>
<g class="box-blue">
<rect x="556" y="160" width="80" height="48" rx="8" stroke-width="0.5"/>
<text class="th" x="596" y="184" text-anchor="middle" dominant-baseline="central">RNN</text>
</g>

<path d="M140 184 L184 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M264 184 L308 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M388 184 L432 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M512 184 L556 184" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<text class="ts" x="162" y="174" text-anchor="middle">隠れ</text>
<text class="ts" x="162" y="186" text-anchor="middle">状態</text>
<text class="ts" x="286" y="174" text-anchor="middle">隠れ</text>
<text class="ts" x="286" y="186" text-anchor="middle">状態</text>
<text class="ts" x="410" y="174" text-anchor="middle">隠れ</text>
<text class="ts" x="410" y="186" text-anchor="middle">状態</text>
<text class="ts" x="534" y="174" text-anchor="middle">隠れ</text>
<text class="ts" x="534" y="186" text-anchor="middle">状態</text>

<line x1="100" y1="208" x2="100" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="224" y1="208" x2="224" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="348" y1="208" x2="348" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="472" y1="208" x2="472" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="596" y1="208" x2="596" y2="250" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<g class="box-teal">
<rect x="60" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="100" y="268" text-anchor="middle" dominant-baseline="central">あ？</text>
</g>
<g class="box-teal">
<rect x="184" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="224" y="268" text-anchor="middle" dominant-baseline="central">あり？</text>
</g>
<g class="box-teal">
<rect x="308" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="348" y="268" text-anchor="middle" dominant-baseline="central">ありが…</text>
</g>
<g class="box-teal">
<rect x="432" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="472" y="268" text-anchor="middle" dominant-baseline="central">ありがと</text>
</g>
<g class="box-teal">
<rect x="556" y="250" width="80" height="36" rx="6" stroke-width="0.5"/>
<text class="th" x="596" y="268" text-anchor="middle" dominant-baseline="central">ありがとう</text>
</g>
<text class="ts" x="340" y="306" text-anchor="middle">出力（認識結果）＝隠れ状態に蓄積された文脈をもとに確定していく</text>
</svg>
