<svg viewBox="0 0 680 380" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif">

  <rect width="680" height="380" fill="#fafafa" rx="8"/>

  <text x="340" y="34" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Word Embeddingによる意味の計算</text>
  <text x="340" y="54" text-anchor="middle" font-size="12" fill="#666">ベクトルの加減算で「意味の関係」が計算できる</text>

  <!-- ===== 上段：計算式のイメージ ===== -->

  <!-- 王様ボックス -->
  <rect x="30" y="80" width="100" height="60" rx="8" fill="#fff3cd" stroke="#e6a817" stroke-width="2"/>
  <text x="80" y="107" text-anchor="middle" font-size="18" font-weight="bold" fill="#9a6800">王様</text>
  <text x="80" y="126" text-anchor="middle" font-size="10" fill="#b8860b">男性・権力・支配</text>

  <!-- − -->
  <text x="148" y="116" text-anchor="middle" font-size="26" font-weight="bold" fill="#555">−</text>

  <!-- 男性ボックス -->
  <rect x="166" y="80" width="100" height="60" rx="8" fill="#ddeeff" stroke="#4a90d9" stroke-width="2"/>
  <text x="216" y="107" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5fa8">男性</text>
  <text x="216" y="126" text-anchor="middle" font-size="10" fill="#4a90d9">性別属性</text>

  <!-- + -->
  <text x="284" y="116" text-anchor="middle" font-size="26" font-weight="bold" fill="#555">+</text>

  <!-- 女性ボックス -->
  <rect x="302" y="80" width="100" height="60" rx="8" fill="#fde8f0" stroke="#e57373" stroke-width="2"/>
  <text x="352" y="107" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">女性</text>
  <text x="352" y="126" text-anchor="middle" font-size="10" fill="#e57373">性別属性</text>

  <!-- ≈ -->
  <text x="420" y="116" text-anchor="middle" font-size="26" fill="#555">≈</text>

  <!-- 女王ボックス -->
  <rect x="438" y="80" width="100" height="60" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2.5"/>
  <text x="488" y="107" text-anchor="middle" font-size="18" font-weight="bold" fill="#6a1b9a">女王</text>
  <text x="488" y="126" text-anchor="middle" font-size="10" fill="#9c27b0">女性・権力・支配</text>

  <!-- 解説矢印 -->
  <text x="80" y="158" text-anchor="middle" font-size="10" fill="#9a6800">「支配・権力」を保持</text>
  <text x="216" y="158" text-anchor="middle" font-size="10" fill="#4a90d9">「男性」を除去</text>
  <text x="352" y="158" text-anchor="middle" font-size="10" fill="#c62828">「女性」を追加</text>
  <text x="488" y="158" text-anchor="middle" font-size="10" fill="#6a1b9a">結果：女王に一致！</text>

  <!-- ===== ベクトル空間のイメージ ===== -->
  <line x1="40" y1="340" x2="640" y2="340" stroke="#ccc" stroke-width="1.5"/>
  <line x1="60" y1="350" x2="60" y2="185" stroke="#ccc" stroke-width="1.5"/>
  <text x="644" y="344" font-size="10" fill="#aaa">→</text>
  <text x="54" y="180" font-size="10" fill="#aaa">↑</text>
  <text x="62" y="360" font-size="10" fill="#aaa">権力・地位の高さ →</text>

  <!-- 王様の点 -->
  <circle cx="320" cy="220" r="10" fill="#e6a817"/>
  <text x="320" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a6800">王様</text>

  <!-- 男性の点 -->
  <circle cx="320" cy="290" r="10" fill="#4a90d9"/>
  <text x="320" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5fa8">男性</text>

  <!-- 女性の点 -->
  <circle cx="490" cy="290" r="10" fill="#e57373"/>
  <text x="490" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">女性</text>

  <!-- 女王の点 -->
  <circle cx="490" cy="220" r="10" fill="#9c27b0"/>
  <text x="490" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a1b9a">女王</text>

  <!-- 男→女 の横矢印（性別方向） -->
  <line x1="330" y1="290" x2="478" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#arrGray2)"/>
  <text x="405" y="308" text-anchor="middle" font-size="10" fill="#888">+ 女性 − 男性</text>

  <!-- 王様→女王 の横矢印（同じ方向） -->
  <line x1="330" y1="220" x2="478" y2="220" stroke="#888" stroke-width="1.5" marker-end="url(#arrGray2)"/>
  <text x="405" y="214" text-anchor="middle" font-size="10" fill="#888">+ 女性 − 男性</text>

  <!-- 王様→男性 の縦矢印（地位方向） -->
  <line x1="310" y1="230" x2="310" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arrGray2)"/>

  <!-- 女王→女性 の縦矢印 -->
  <line x1="480" y1="230" x2="480" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arrGray2)"/>

  <!-- 「同じベクトル」注記 -->
  <text x="260" y="257" text-anchor="middle" font-size="9" fill="#888">地位</text>
  <text x="260" y="267" text-anchor="middle" font-size="9" fill="#888">↕</text>

  <!-- 平行四辺形を強調 -->
  <polygon points="320,220 490,220 490,290 320,290" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== 他の例 ===== -->
  <rect x="560" y="185" width="108" height="80" rx="6" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="614" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">他の例</text>
  <text x="614" y="220" text-anchor="middle" font-size="10" fill="#333">東京−日本</text>
  <text x="614" y="233" text-anchor="middle" font-size="10" fill="#333">+フランス≈パリ</text>
  <line x1="572" y1="240" x2="656" y2="240" stroke="#eee" stroke-width="1"/>
  <text x="614" y="253" text-anchor="middle" font-size="10" fill="#333">速い−速さ</text>
  <text x="614" y="266" text-anchor="middle" font-size="10" fill="#333">+重さ≈重い</text>

  <defs>
    <marker id="arrGray2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>

  <text x="340" y="370" text-anchor="middle" font-size="10" fill="#aaa">※ 図は概念的なイメージです。実際のベクトルは100〜300次元で、2次元には直接表示できません</text>

</svg>
