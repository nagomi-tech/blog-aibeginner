<svg viewBox="0 0 680 440" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif">

  <rect width="680" height="440" fill="#fafafa" rx="8"/>

  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Word Embeddingによる意味の計算</text>
  <text x="340" y="46" text-anchor="middle" font-size="12" fill="#666">ベクトルの加減算で「意味の関係」が計算できる</text>

  <!-- ===== 上段：計算式 ===== -->
  <rect x="70" y="60" width="86" height="50" rx="7" fill="#fff3cd" stroke="#e6a817" stroke-width="1.5"/>
  <text x="113" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a6800">王様</text>
  <text x="113" y="99" text-anchor="middle" font-size="9" fill="#b8860b">男性・権力・支配</text>

  <text x="172" y="91" text-anchor="middle" font-size="22" font-weight="bold" fill="#555">−</text>

  <rect x="190" y="60" width="86" height="50" rx="7" fill="#ddeeff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="233" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a5fa8">男性</text>
  <text x="233" y="99" text-anchor="middle" font-size="9" fill="#4a90d9">性別属性</text>

  <text x="292" y="91" text-anchor="middle" font-size="22" font-weight="bold" fill="#555">+</text>

  <rect x="308" y="60" width="86" height="50" rx="7" fill="#fde8f0" stroke="#e57373" stroke-width="1.5"/>
  <text x="351" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">女性</text>
  <text x="351" y="99" text-anchor="middle" font-size="9" fill="#e57373">性別属性</text>

  <text x="410" y="91" text-anchor="middle" font-size="22" fill="#555">≈</text>

  <rect x="424" y="60" width="86" height="50" rx="7" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <text x="467" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#6a1b9a">女王</text>
  <text x="467" y="99" text-anchor="middle" font-size="9" fill="#9c27b0">女性・権力・支配</text>

  <text x="113" y="122" text-anchor="middle" font-size="9" fill="#9a6800">「権力・支配」を保持</text>
  <text x="233" y="122" text-anchor="middle" font-size="9" fill="#4a90d9">「男性」を除去</text>
  <text x="351" y="122" text-anchor="middle" font-size="9" fill="#c62828">「女性」を追加</text>
  <text x="467" y="122" text-anchor="middle" font-size="9" fill="#6a1b9a">結果：女王に一致！</text>

  <!-- 区切り線 -->
  <line x1="40" y1="138" x2="640" y2="138" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ===== 下段：意味空間（散布図スタイル） ===== -->

  <!--
    4点の配置：
    王様クラスター（左上寄り）：
      王様  : (170, 220)
      女王  : (230, 185)   王様から右上へ少し

    男性クラスター（右下寄り・2クラスター間は離す）：
      男性  : (420, 320)
      女性  : (480, 285)   男性から右上へ少し（王様→女王と同じベクトル）

    性別ベクトル（王様→女王、男性→女性）は同じ方向・同じ長さ：
      Δx = +60, Δy = -35
  -->

  <!-- クラスターの背景（薄い楕円で「近さ」を強調） -->
  <!-- 王族クラスター -->
  <ellipse cx="200" cy="205" rx="75" ry="52" fill="#fff8e1" stroke="#e6a817" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="138" y="158" font-size="11" fill="#9a6800" font-weight="bold">王族グループ</text>
  <text x="138" y="170" font-size="10" fill="#b8860b">（意味的に近い）</text>

  <!-- 性別クラスター -->
  <ellipse cx="450" cy="305" rx="75" ry="52" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="490" y="360" font-size="11" fill="#3949ab" font-weight="bold">性別グループ</text>
  <text x="490" y="372" font-size="10" fill="#5c6bc0">（意味的に近い）</text>

  <!-- 2クラスター間の距離を示すラベル -->
  <line x1="278" y1="222" x2="372" y2="278" stroke="#bbb" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="293" y="234" width="108" height="22" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="347" y="249" text-anchor="middle" font-size="10" fill="#888">2グループは文脈のパターンが異なる</text>

  <!-- ===== 性別ベクトル（Δx=+60, Δy=-35）===== -->
  <!-- 王様 → 女王 -->
  <line x1="182" y1="218" x2="236" y2="188" stroke="#c2185b" stroke-width="3" marker-end="url(#arrPinkF)"/>
  <!-- 男性 → 女性 -->
  <line x1="432" y1="318" x2="486" y2="288" stroke="#c2185b" stroke-width="3" marker-end="url(#arrPinkF)"/>

  <!-- 「同じベクトル」を示す波括弧ラベル -->
  <rect x="268" y="168" width="130" height="38" rx="5" fill="#fce4ec" stroke="#c2185b" stroke-width="1.2"/>
  <text x="333" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2185b">同じ方向・同じ長さ</text>
  <text x="333" y="198" text-anchor="middle" font-size="10" fill="#c62828">＝「性別」を表すベクトル</text>
  <!-- ラベル→矢印への指示線 -->
  <line x1="268" y1="183" x2="218" y2="206" stroke="#c2185b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="398" y1="183" x2="462" y2="300" stroke="#c2185b" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ===== 各点（単語）===== -->
  <!-- 王様 (170, 220) -->
  <circle cx="170" cy="222" r="14" fill="#e6a817" stroke="#b8860b" stroke-width="2"/>
  <text x="170" y="226" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">王様</text>
  <text x="144" y="244" text-anchor="middle" font-size="11" fill="#9a6800">王様</text>

  <!-- 女王 (230, 187) -->
  <circle cx="232" cy="187" r="14" fill="#9c27b0" stroke="#6a1b9a" stroke-width="2"/>
  <text x="232" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">女王</text>
  <text x="256" y="178" text-anchor="middle" font-size="11" fill="#6a1b9a">女王</text>

  <!-- 男性 (420, 322) -->
  <circle cx="420" cy="322" r="14" fill="#4a90d9" stroke="#1a5fa8" stroke-width="2"/>
  <text x="420" y="326" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">男性</text>
  <text x="396" y="344" text-anchor="middle" font-size="11" fill="#1a5fa8">男性</text>

  <!-- 女性 (480, 287) -->
  <circle cx="482" cy="287" r="14" fill="#e57373" stroke="#c62828" stroke-width="2"/>
  <text x="482" y="291" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">女性</text>
  <text x="506" y="278" text-anchor="middle" font-size="11" fill="#c62828">女性</text>

  <!-- ===== 右下：他の例ボックス ===== -->
  <rect x="490" y="155" width="168" height="72" rx="6" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="574" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">同じ構造の例</text>
  <line x1="498" y1="178" x2="650" y2="178" stroke="#eee" stroke-width="1"/>
  <text x="574" y="194" text-anchor="middle" font-size="10" fill="#333">東京 − 日本 + フランス</text>
  <text x="574" y="207" text-anchor="middle" font-size="10" fill="#888">≈ パリ（首都の関係）</text>
  <text x="574" y="220" text-anchor="middle" font-size="10" fill="#333">速い − 速さ + 重さ ≈ 重い</text>

  <defs>
    <marker id="arrPinkF" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#c2185b"/>
    </marker>
  </defs>

  <text x="300" y="428" text-anchor="middle" font-size="10" fill="#aaa">※ 図は概念的なイメージです。実際のベクトルは100〜300次元で、2次元には直接表示できません</text>

</svg>
