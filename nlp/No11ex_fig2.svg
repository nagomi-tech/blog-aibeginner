<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif">

  <rect width="680" height="400" fill="#fafafa" rx="8"/>

  <text x="340" y="34" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">One-hot表現 vs Word Embedding</text>

  <!-- 中央の仕切り線 -->
  <line x1="340" y1="50" x2="340" y2="390" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== 左側：One-hot ===== -->
  <text x="170" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">One-hot表現</text>

  <!-- 語彙リスト -->
  <text x="40" y="84" font-size="11" fill="#888">語彙：猫・犬・魚・車・飛行機</text>

  <!-- 猫のベクトル -->
  <text x="40" y="110" font-size="12" fill="#1a5fa8" font-weight="bold">「猫」</text>
  <rect x="90"  y="96" width="24" height="22" rx="3" fill="#4a90d9" stroke="#4a90d9"/>
  <text x="102" y="112" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">1</text>
  <rect x="116" y="96" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="128" y="112" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="142" y="96" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="154" y="112" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="168" y="96" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="180" y="112" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="194" y="96" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="206" y="112" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <text x="224" y="112" font-size="11" fill="#888">…</text>
  <text x="246" y="112" font-size="10" fill="#aaa">[1,0,0,0,0,…]</text>

  <!-- 犬のベクトル -->
  <text x="40" y="140" font-size="12" fill="#1a5fa8" font-weight="bold">「犬」</text>
  <rect x="90"  y="126" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="102" y="142" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="116" y="126" width="24" height="22" rx="3" fill="#4a90d9" stroke="#4a90d9"/>
  <text x="128" y="142" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">1</text>
  <rect x="142" y="126" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="154" y="142" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="168" y="126" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="180" y="142" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="194" y="126" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="206" y="142" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <text x="224" y="142" font-size="11" fill="#888">…</text>
  <text x="246" y="142" font-size="10" fill="#aaa">[0,1,0,0,0,…]</text>

  <!-- 飛行機のベクトル -->
  <text x="40" y="170" font-size="12" fill="#1a5fa8" font-weight="bold">「飛行機」</text>
  <rect x="90"  y="156" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="102" y="172" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="116" y="156" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="128" y="172" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="142" y="156" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="154" y="172" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="168" y="156" width="24" height="22" rx="3" fill="#eee" stroke="#ccc"/>
  <text x="180" y="172" text-anchor="middle" font-size="11" fill="#bbb">0</text>
  <rect x="194" y="156" width="24" height="22" rx="3" fill="#4a90d9" stroke="#4a90d9"/>
  <text x="206" y="172" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">1</text>
  <text x="224" y="172" font-size="11" fill="#888">…</text>
  <text x="246" y="172" font-size="10" fill="#aaa">[0,0,0,0,1,…]</text>

  <!-- 問題の説明 -->
  <rect x="30" y="196" width="296" height="56" rx="6" fill="#fff0f0" stroke="#e57373" stroke-width="1.5"/>
  <text x="178" y="216" text-anchor="middle" font-size="11" fill="#c62828">⚠ 「猫」と「犬」の距離</text>
  <text x="178" y="234" text-anchor="middle" font-size="11" fill="#c62828">＝「猫」と「飛行機」の距離</text>
  <text x="178" y="248" text-anchor="middle" font-size="10" fill="#e57373">意味の近さが数値に反映されない</text>

  <!-- 次元数の問題 -->
  <rect x="30" y="264" width="296" height="36" rx="6" fill="#fff0f0" stroke="#e57373" stroke-width="1.5"/>
  <text x="178" y="283" text-anchor="middle" font-size="11" fill="#c62828">⚠ 語彙10万語 → 10万次元のベクトル</text>
  <text x="178" y="297" text-anchor="middle" font-size="10" fill="#e57373">ほぼすべての要素が 0（無駄）</text>

  <!-- ===== 右側：Word Embedding ===== -->
  <text x="510" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">Word Embedding</text>

  <!-- 意味空間の図（2次元に射影したイメージ） -->
  <!-- 軸 -->
  <line x1="370" y1="310" x2="650" y2="310" stroke="#bbb" stroke-width="1.5"/>
  <line x1="380" y1="320" x2="380" y2="80" stroke="#bbb" stroke-width="1.5"/>
  <text x="654" y="314" font-size="10" fill="#aaa">→</text>
  <text x="374" y="75" font-size="10" fill="#aaa">↑</text>

  <!-- 単語の配置 -->
  <!-- 猫 -->
  <circle cx="450" cy="160" r="28" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="450" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5fa8">猫</text>
  <text x="450" y="172" text-anchor="middle" font-size="9" fill="#4a90d9">ネコ科</text>

  <!-- 犬 -->
  <circle cx="500" cy="185" r="28" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="500" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5fa8">犬</text>
  <text x="500" y="197" text-anchor="middle" font-size="9" fill="#4a90d9">イヌ科</text>

  <!-- 魚 -->
  <circle cx="460" cy="230" r="28" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="460" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5fa8">魚</text>
  <text x="460" y="242" text-anchor="middle" font-size="9" fill="#4a90d9">水産</text>

  <!-- 車 -->
  <circle cx="590" cy="240" r="28" fill="#f0fff0" stroke="#4caf50" stroke-width="2"/>
  <text x="590" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">車</text>
  <text x="590" y="252" text-anchor="middle" font-size="9" fill="#4caf50">乗り物</text>

  <!-- 飛行機 -->
  <circle cx="610" cy="170" r="28" fill="#f0fff0" stroke="#4caf50" stroke-width="2"/>
  <text x="610" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">飛行</text>
  <text x="610" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">機</text>
  <text x="610" y="190" text-anchor="middle" font-size="9" fill="#4caf50">乗り物</text>

  <!-- 近さを示すブレース -->
  <!-- 動物グループの囲み -->
  <ellipse cx="472" cy="193" rx="70" ry="68" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="395" y="128" font-size="10" fill="#4a90d9">動物グループ</text>
  <text x="395" y="140" font-size="10" fill="#4a90d9">（文脈が似ている）</text>

  <!-- 乗り物グループの囲み -->
  <ellipse cx="600" cy="205" rx="54" ry="52" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="618" y="270" font-size="10" fill="#4caf50">乗り物グループ</text>
  <text x="618" y="282" font-size="10" fill="#4caf50">（文脈が似ている）</text>

  <!-- 2グループ間の距離矢印 -->
  <line x1="542" y1="193" x2="558" y2="193" stroke="#e57373" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="550" y="212" text-anchor="middle" font-size="10" fill="#e57373">遠い</text>

  <!-- ✓の注記 -->
  <rect x="362" y="330" width="295" height="46" rx="6" fill="#f0fff0" stroke="#4caf50" stroke-width="1.5"/>
  <text x="510" y="350" text-anchor="middle" font-size="11" fill="#2e7d32">✓ 同じ文脈で使われやすい単語は空間的に近く配置</text>
  <text x="510" y="366" text-anchor="middle" font-size="11" fill="#2e7d32">✓ 100〜300次元（コンパクト）</text>

</svg>
