<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図5：バックプロパゲーションと損失の変化</title>
<style>
  body { margin: 0; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
  canvas { display: block; margin: 0 auto; }
  #ctrl9f5 { text-align:center; margin-top:6px; }
  button {
    padding: 5px 18px; font-size: 12px; border-radius: 6px; border: 1px solid #6366f1;
    background: #eef2ff; color: #4338ca; cursor: pointer; margin: 0 4px;
  }
  button:hover { background: #e0e7ff; }
</style>
</head>
<body>
<canvas id="canvas9f5"></canvas>
<div id="ctrl9f5">
  <button id="btn9f5">▶ 学習を進める</button>
  <button id="rst9f5">↺ リセット</button>
</div>
<p style="text-align:center;font-size:0.85em;color:#555;margin-top:6px;">図5：順伝播（→）と逆伝播（←）の流れ、および学習による損失の変化</p>
<script>
(()=>{
  const canvas = document.getElementById('canvas9f5');
  const dpr = window.devicePixelRatio || 1;
  const W = Math.min(window.innerWidth, 720);
  const H = 360;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // レイアウト
  const topH = H * 0.52;   // 上段：ネットワーク図
  const botH = H - topH;   // 下段：損失グラフ

  const layers = [
    {n:3, label:'入力層', fc:'#dbeafe', sc:'#3b82f6', tc:'#1d4ed8'},
    {n:4, label:'隠れ層①', fc:'#d1fae5', sc:'#10b981', tc:'#065f46'},
    {n:4, label:'隠れ層②', fc:'#d1fae5', sc:'#10b981', tc:'#065f46'},
    {n:2, label:'出力層', fc:'#fce7f3', sc:'#ec4899', tc:'#9d174d'},
  ];
  const R = 16;
  const lxs = [0.12,0.38,0.62,0.88].map(f=>f*W);
  const cy = topH * 0.58;

  function ny(li,ni){
    const n=layers[li].n;
    const sp=Math.min(52,(topH*0.62)/n);
    return cy-(n-1)*sp/2+ni*sp;
  }

  // 損失曲線データ（擬似的な減衰曲線）
  const totalEpochs = 8;
  let currentEpoch = 0; // 0=初期, 1〜8=学習中
  let phase = 0; // 0=待機, 1=順伝播表示, 2=逆伝播表示, 3=損失更新

  function lossAt(e){ return 2.4 * Math.exp(-0.45*e) + 0.18; }

  function drawNetwork(fwdActive, bwdActive){
    // 接続線
    for(let l=0;l<layers.length-1;l++){
      for(let i=0;i<layers[l].n;i++){
        for(let j=0;j<layers[l+1].n;j++){
          let color='rgba(209,213,219,0.5)', lw=0.8;
          if(fwdActive && l < fwdActive) { color='rgba(59,130,246,0.3)'; lw=1.2; }
          if(bwdActive && l >= layers.length-1-bwdActive) { color='rgba(239,68,68,0.3)'; lw=1.2; }
          ctx.strokeStyle=color; ctx.lineWidth=lw;
          ctx.beginPath();
          ctx.moveTo(lxs[l]+R, ny(l,i));
          ctx.lineTo(lxs[l+1]-R, ny(l+1,j));
          ctx.stroke();
        }
      }
    }

    // ニューロン
    layers.forEach((ld,li)=>{
      for(let i=0;i<ld.n;i++){
        const x=lxs[li], y=ny(li,i);
        let fc=ld.fc, sc=ld.sc;
        ctx.beginPath(); ctx.arc(x,y,R,0,Math.PI*2);
        ctx.fillStyle=fc; ctx.fill();
        ctx.strokeStyle=sc; ctx.lineWidth=2; ctx.stroke();
        if(li>0&&li<3){
          ctx.fillStyle=ld.tc; ctx.font='10px Arial';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('f', x, y);
        }
      }
    });

    // 層ラベル
    layers.forEach((ld,li)=>{
      ctx.fillStyle=ld.tc; ctx.font='bold 11px Helvetica Neue,Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(ld.label, lxs[li], 16);
    });
  }

  function drawArrow(x1,y1,x2,y2,color,lw=2){
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const a=Math.atan2(y2-y1,x2-x1);
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-9*Math.cos(a-0.4),y2-9*Math.sin(a-0.4));
    ctx.lineTo(x2-9*Math.cos(a+0.4),y2-9*Math.sin(a+0.4));
    ctx.closePath(); ctx.fill();
  }

  function drawLossGraph(){
    const gx = W*0.08, gy = topH + botH*0.82;
    const gw = W*0.84, gh = botH*0.62;

    // 背景
    ctx.fillStyle='#f9fafb';
    ctx.beginPath(); ctx.roundRect(gx-8, topH+6, gw+16, botH-10, 6); ctx.fill();
    ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1; ctx.stroke();

    // 軸
    ctx.strokeStyle='#374151'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(gx,gy-gh); ctx.lineTo(gx,gy); ctx.lineTo(gx+gw,gy); ctx.stroke();

    // ラベル
    ctx.fillStyle='#374151'; ctx.font='10px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('エポック（繰り返し回数）', gx+gw/2, gy+14);
    ctx.save(); ctx.translate(gx-22,gy-gh/2); ctx.rotate(-Math.PI/2);
    ctx.fillText('損失（Loss）', 0, 0); ctx.restore();

    // Y軸目盛
    [0,1,2].forEach(v=>{
      const py=gy-(v/2.5)*gh;
      ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(gx,py); ctx.lineTo(gx+gw,py); ctx.stroke();
      ctx.fillStyle='#9ca3af'; ctx.font='9px Arial'; ctx.textAlign='right';
      ctx.fillText(v.toFixed(1), gx-4, py);
    });

    // 損失曲線（描画済み分）
    if(currentEpoch > 0){
      ctx.strokeStyle='#6366f1'; ctx.lineWidth=2.5; ctx.setLineDash([]);
      ctx.beginPath();
      for(let e=0;e<=currentEpoch;e++){
        const px=gx+(e/totalEpochs)*gw;
        const loss=lossAt(e);
        const py=gy-(loss/2.5)*gh;
        if(e===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();

      // 現在のエポック点
      const cpx=gx+(currentEpoch/totalEpochs)*gw;
      const closs=lossAt(currentEpoch);
      const cpy=gy-(closs/2.5)*gh;
      ctx.beginPath(); ctx.arc(cpx,cpy,5,0,Math.PI*2);
      ctx.fillStyle='#6366f1'; ctx.fill();
      ctx.fillStyle='#4338ca'; ctx.font='bold 10px Arial'; ctx.textAlign='left';
      ctx.fillText('損失: '+closs.toFixed(2), cpx+8, cpy);
    }

    // タイトル
    ctx.fillStyle='#1e3a5f'; ctx.font='bold 11px Helvetica Neue,Arial';
    ctx.textAlign='center';
    ctx.fillText('学習の進行と損失の変化', gx+gw/2, topH+18);
  }

  function drawPhaseArrows(){
    const ay = topH * 0.92;
    // 順伝播矢印（→）
    for(let l=0;l<3;l++){
      const x1=lxs[l]+R+4, x2=lxs[l+1]-R-4;
      const active = phase >= 1;
      drawArrow(x1,ay,x2,ay, active?'#3b82f6':'#d1d5db', active?2:1);
    }
    // 順伝播ラベル
    ctx.fillStyle=phase>=1?'#1d4ed8':'#9ca3af';
    ctx.font=(phase>=1?'bold ':'')+'10px Arial'; ctx.textAlign='center';
    ctx.fillText('順伝播（予測を計算）', W*0.5, ay-12);

    // 逆伝播矢印（←）
    const ay2 = topH * 0.99;
    for(let l=2;l>=0;l--){
      const x1=lxs[l+1]-R-4, x2=lxs[l]+R+4;
      const active = phase >= 2;
      drawArrow(x1,ay2,x2,ay2, active?'#ef4444':'#d1d5db', active?2:1);
    }
    ctx.fillStyle=phase>=2?'#b91c1c':'#9ca3af';
    ctx.font=(phase>=2?'bold ':'')+'10px Arial'; ctx.textAlign='center';
    ctx.fillText('逆伝播（誤差を逆向きに伝える）', W*0.5, ay2+12);
  }

  // 損失ボックス（出力層の右）
  function drawLossBox(){
    const bx=lxs[3]+R+8, by=cy-22, bw=80, bh=44;
    const active=phase>=1;
    ctx.fillStyle=active?'#fef3c7':'#f9fafb';
    ctx.strokeStyle=active?'#f59e0b':'#d1d5db'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=active?'#92400e':'#9ca3af';
    ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('損失', bx+bw/2, by+14);
    if(active && currentEpoch>0){
      ctx.font='11px Arial';
      ctx.fillText(lossAt(currentEpoch).toFixed(2), bx+bw/2, by+30);
    }
  }

  // ステップ説明
  const msgs=[
    'ボタンを押して学習を進めてください',
    '① 順伝播：入力から出力へ予測を計算',
    '② 逆伝播：損失を出力層から逆向きに伝え、重みを更新',
    `エポック ${currentEpoch}/${totalEpochs}：損失が下がりました`,
  ];

  function draw(){
    ctx.clearRect(0,0,W,H);

    // 上下の区切り
    ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,topH); ctx.lineTo(W,topH); ctx.stroke();

    drawNetwork(phase>=1?3:0, phase>=2?3:0);
    drawPhaseArrows();
    drawLossBox();
    drawLossGraph();

    // 説明テキスト
    const msg = phase===3 ? `エポック ${currentEpoch}/${totalEpochs}：損失 ${lossAt(currentEpoch).toFixed(2)}（学習が進んでいます）` : msgs[phase];
    ctx.fillStyle='#f9fafb';
    ctx.beginPath(); ctx.roundRect(W*0.05, topH-36, W*0.9, 26, 5); ctx.fill();
    ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#4338ca'; ctx.font='11px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(msg, W*0.5, topH-23);
  }

  document.getElementById('btn9f5').addEventListener('click',()=>{
    if(phase===0){ phase=1; draw(); return; }
    if(phase===1){ phase=2; draw(); return; }
    if(phase===2){
      if(currentEpoch < totalEpochs){ currentEpoch++; }
      phase=3; draw();
      setTimeout(()=>{ phase=1; draw(); },600);
      return;
    }
    if(phase===3){
      if(currentEpoch < totalEpochs){ phase=1; draw(); }
    }
  });
  document.getElementById('rst9f5').addEventListener('click',()=>{
    phase=0; currentEpoch=0; draw();
  });

  draw();
})();
</script>
</body>
</html>
