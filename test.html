<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>図2：畳み込み演算（平均フィルター）</title>
<style>
  body { margin: 0; background: #fff; font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; }
  canvas { display: block; }
  #ctrl { text-align: center; margin-top: 8px; }
  button {
    padding: 6px 22px; font-size: 14px; cursor: pointer;
    background: #3a7bd5; color: #fff; border: none; border-radius: 4px; margin: 0 4px;
  }
  button:hover { background: #2a5bb5; }
  #msg { font-size: 12px; color: #444; margin-top: 6px; min-height: 40px; line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<canvas id="c" width="720" height="420"></canvas>
<div id="ctrl">
  <button id="btnPlay">▶ 再生</button>
  <button id="btnReset">↺ リセット</button>
  <div id="msg"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');

// 9×9 十字パターン
const D = 20, B = 200, M = 100;
const input = [
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
  [M,   M,   M,   M,   B,   M,   M,   M,   M],
  [B,   B,   B,   B,   B,   B,   B,   B,   B],
  [M,   M,   M,   M,   B,   M,   M,   M,   M],
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
  [D,   D,   D,   M,   B,   M,   D,   D,   D],
];

// 3×3 平均フィルター（すべて 1/9）
const filter = [
  [1, 1, 1],
  [1, 1, 1],
  [1, 1, 1],
];

const IN = 9, F = 3, OUT = 7;

// 出力特徴マップを事前計算
const outMap = [];
for (let r = 0; r < OUT; r++) {
  outMap[r] = [];
  for (let c = 0; c < OUT; c++) {
    let sum = 0;
    for (let fr = 0; fr < F; fr++)
      for (let fc = 0; fc < F; fc++)
        sum += input[r+fr][c+fc] * filter[fr][fc];
    outMap[r][c] = Math.round(sum / 9);
  }
}

// レイアウト
const cell = 30;
const inX = 10, inY = 55;
const filtX = inX + IN * cell + 22, filtY = inY + (IN * cell - F * cell) / 2;
const outCell = 34;
const outX = filtX + F * cell + 50, outY = inY + (IN * cell - OUT * outCell) / 2;

let step = -1;
let playing = false;
let animId = null;

function cellColor(v) {
  const c = Math.round(Math.min(255, Math.max(0, v)));
  return `rgb(${c},${c},${c})`;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pos = step >= 0 ? { r: Math.floor(step / OUT), c: step % OUT } : null;

  // タイトル
  ctx.fillStyle = '#222';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('入力画像（9×9）', inX, inY - 18);
  ctx.fillText('平均フィルター（3×3）', filtX, filtY - 14);
  ctx.fillText('特徴マップ（7×7）', outX, outY - 14);

  // サブタイトル
  ctx.fillStyle = '#888';
  ctx.font = '11px sans-serif';
  ctx.fillText('暗い背景に明るい十字', inX, inY - 6);
  ctx.fillText('9マスの平均をとる', filtX, filtY - 3);

  // --- 入力画像 ---
  for (let r = 0; r < IN; r++) {
    for (let c = 0; c < IN; c++) {
      const v = input[r][c];
      ctx.fillStyle = cellColor(v);
      ctx.fillRect(inX + c * cell, inY + r * cell, cell - 1, cell - 1);
      ctx.fillStyle = v > 120 ? '#333' : '#aaa';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(v, inX + c * cell + cell/2, inY + r * cell + cell/2 + 3);
    }
  }

  // フィルター位置ハイライト
  if (pos) {
    ctx.strokeStyle = '#f90';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(inX + pos.c * cell, inY + pos.r * cell, F * cell - 1, F * cell - 1);
    // ハイライト内を薄く塗る
    ctx.fillStyle = 'rgba(255,160,0,0.15)';
    ctx.fillRect(inX + pos.c * cell, inY + pos.r * cell, F * cell - 1, F * cell - 1);
  }

  // --- 平均フィルター ---
  const fLabels = ['1','1','1','1','1','1','1','1','1'];
  let fi = 0;
  for (let r = 0; r < F; r++) {
    for (let c = 0; c < F; c++) {
      ctx.fillStyle = 'rgba(100,160,255,0.18)';
      ctx.fillRect(filtX + c * cell, filtY + r * cell, cell - 1, cell - 1);
      ctx.strokeStyle = '#99b';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(filtX + c * cell, filtY + r * cell, cell - 1, cell - 1);
      ctx.fillStyle = '#3a5ba0';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(fLabels[fi++], filtX + c * cell + cell/2, filtY + r * cell + cell/2 + 5);
    }
  }
  // ÷9 の注記
  ctx.fillStyle = '#555';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('÷ 9', filtX + F * cell / 2, filtY + F * cell + 18);

  // --- 矢印 ---
  const ax1 = filtX + F * cell + 8;
  const ax2 = outX - 8;
  const ay = outY + OUT * outCell / 2;
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ax1, ay); ctx.lineTo(ax2, ay); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ax2, ay); ctx.lineTo(ax2-9, ay-5); ctx.lineTo(ax2-9, ay+5);
  ctx.closePath(); ctx.fillStyle = '#555'; ctx.fill();
  ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#555';
  ctx.fillText('合計して', (ax1+ax2)/2, ay - 10);
  ctx.fillText('÷9', (ax1+ax2)/2, ay + 4);

  // --- 出力特徴マップ ---
  for (let r = 0; r < OUT; r++) {
    for (let c = 0; c < OUT; c++) {
      const filled = step >= 0 && r * OUT + c <= step;
      const isCurrent = pos && r === pos.r && c === pos.c;
      const v = outMap[r][c];

      ctx.fillStyle = filled ? cellColor(v) : '#f0f0f0';
      ctx.fillRect(outX + c * outCell, outY + r * outCell, outCell - 1, outCell - 1);
      ctx.strokeStyle = isCurrent ? '#f90' : '#bbb';
      ctx.lineWidth = isCurrent ? 2.5 : 0.5;
      ctx.strokeRect(outX + c * outCell, outY + r * outCell, outCell - 1, outCell - 1);

      if (filled) {
        ctx.fillStyle = '#fff';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(v, outX + c * outCell + outCell/2, outY + r * outCell + outCell/2 + 4);
      }
    }
  }

  // --- 説明文 ---
  if (step === -1) {
    msg.innerHTML = '▶ 再生 を押すと、フィルターが左上から右下へスライドします<br>フィルターが止まるたびに、覗いた9マスの平均値が特徴マップに記録されます';
  } else if (pos) {
    // 現在位置の9マスの値を取得
    const vals = [];
    for (let fr = 0; fr < F; fr++)
      for (let fc = 0; fc < F; fc++)
        vals.push(input[pos.r+fr][pos.c+fc]);
    const sum = vals.reduce((a,b)=>a+b,0);
    const avg = Math.round(sum / 9);
    msg.innerHTML = `位置（行${pos.r+1}・列${pos.c+1}）: 9マスの合計 ${sum} ÷ 9 = <strong>${avg}</strong> → 特徴マップに記録`;
  } else {
    msg.innerHTML = '完成！十字の部分は平均値が高く（明るく）、背景は低く（暗く）なっています<br>十字の輪郭付近は中間値になり、<strong>ぼかし効果</strong>が生まれています';
  }
}

function nextStep() {
  step++;
  draw();
  if (step >= OUT * OUT - 1) {
    playing = false;
    document.getElementById('btnPlay').textContent = '▶ 再生';
    return;
  }
  if (playing) animId = setTimeout(nextStep, 400);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (playing) {
    playing = false; clearTimeout(animId);
    document.getElementById('btnPlay').textContent = '▶ 再生';
  } else {
    if (step >= OUT * OUT - 1) step = -1;
    playing = true;
    document.getElementById('btnPlay').textContent = '⏸ 一時停止';
    nextStep();
  }
});
document.getElementById('btnReset').addEventListener('click', () => {
  playing = false; clearTimeout(animId); step = -1;
  document.getElementById('btnPlay').textContent = '▶ 再生';
  draw();
});

draw();
</script>
</body>
</html>
